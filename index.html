<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fruit & Vegetable Ripeness Detector</title>
    
    <!-- CHANGED: Switched to Unpkg alternative links for bulletproof loading -->
    <script src="https://unpkg.com"></script>
    <script src="https://unpkg.com"></script>

    <style>
        :root {
            --primary: #4CAF50;
            --primary-hover: #45a049;
            --bg: #f4f7f6;
            --card-bg: #ffffff;
            --text: #333333;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        h1 {
            margin-top: 0;
            color: var(--primary);
            font-size: 24px;
        }
        p {
            color: #666;
            font-size: 14px;
            margin-bottom: 25px;
        }
        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            box-shadow: 0 4px 12px rgba(76, 175, 80, 0.2);
        }
        button:hover { background-color: var(--primary-hover); }
        button:active { transform: scale(0.98); }
        #webcam-container {
            margin: 20px auto;
            border-radius: 12px;
            overflow: hidden;
            width: 200px;
            height: 200px;
            background: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
        }
        #webcam-container canvas {
            display: block;
        }
        #label-container {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .label-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f9f9f9;
            padding: 10px 15px;
            border-radius: 8px;
            border-left: 4px solid var(--primary);
            font-weight: 600;
            font-size: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Fruit & Vegetable Ripeness Detector</h1>
    <p>Click start and allow webcam access to scan your produce items live.</p>
    <button type="button" onclick="init()">Start Detector</button>
    <div id="webcam-container"><span>Webcam Off</span></div>
    <div id="label-container"></div>
</div>

<script type="text/javascript">
    const URL = "https://withgoogle.com";

    let model, webcam, labelContainer, maxPredictions;

    async function init() {
        const modelURL = URL + "model.json";
        const metadataURL = URL + "metadata.json";

        try {
            document.getElementById("webcam-container").innerHTML = "Loading Model...";
            
            // Re-verify framework availability
            if (typeof tmImage === 'undefined') {
                throw new Error("Framework files are blocked by your browser network. Try using an Incognito window or different browser.");
            }

            model = await tmImage.load(modelURL, metadataURL);
            maxPredictions = model.getTotalClasses();

            const flip = true; 
            webcam = new tmImage.Webcam(200, 200, flip); 
            
            document.getElementById("webcam-container").innerHTML = "Awaiting Webcam...";
            await webcam.setup(); 
            await webcam.play();
            window.requestAnimationFrame(loop);

            document.getElementById("webcam-container").innerHTML = "";
            document.getElementById("webcam-container").appendChild(webcam.canvas);
            
            labelContainer = document.getElementById("label-container");
            labelContainer.innerHTML = ""; 
            for (let i = 0; i < maxPredictions; i++) {
                const div = document.createElement("div");
                div.className = "label-bar";
                labelContainer.appendChild(div);
            }
        } catch (error) {
            document.getElementById("webcam-container").innerHTML = "<span style='color:red; padding:10px; font-size:12px;'>" + error.message + "</span>";
            console.error(error);
        }
    }

    async function loop() {
        webcam.update(); 
        await predict();
        window.requestAnimationFrame(loop);
    }

    async function predict() {
        const prediction = await model.predict(webcam.canvas);
        for (let i = 0; i < maxPredictions; i++) {
            const classPrediction = prediction[i].className + ": " + (prediction[i].probability * 100).toFixed(0) + "%";
            labelContainer.childNodes[i].innerHTML = classPrediction;
        }
    }
</script>

</body>
</html>
