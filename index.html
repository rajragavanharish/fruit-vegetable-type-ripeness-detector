<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fruit &amp; Vegetable Ripeness Detector</title>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8.3/dist/teachablemachine-image.min.js"></script>

    <style>
        :root {
            --primary: #4CAF50;
            --primary-hover: #45a049;
            --danger: #e53935;
            --danger-hover: #c62828;
            --bg: #f4f7f6;
            --card-bg: #ffffff;
            --text: #333333;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        h1 { margin-top: 0; color: var(--primary); font-size: 24px; }
        p { color: #666; font-size: 14px; margin-bottom: 20px; }

        .mode-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            background: #eee;
            border-radius: 10px;
            padding: 4px;
        }
        .mode-tab {
            flex: 1;
            padding: 8px 0;
            border: none;
            background: transparent;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            color: #777;
        }
        .mode-tab.active {
            background: var(--card-bg);
            color: var(--primary);
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
        }

        .btn-row {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        button.action {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 26px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
        }
        button.action:hover { background-color: var(--primary-hover); }
        button.action.stop {
            background-color: var(--danger);
        }
        button.action.stop:hover { background-color: var(--danger-hover); }
        button.action:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        #webcam-container {
            margin: 20px auto;
            border-radius: 12px;
            overflow: hidden;
            width: 200px;
            height: 200px;
            background: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #webcam-container span { font-size: 13px; color: #999; }

        #upload-section { display: none; }
        #upload-section.visible { display: block; }
        #file-input { display: none; }
        .upload-drop {
            margin: 10px auto 0;
            width: 200px;
            height: 200px;
            border: 2px dashed #ccc;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            overflow: hidden;
            background: #fafafa;
            color: #999;
            font-size: 13px;
            text-align: center;
            padding: 10px;
        }
        .upload-drop img { width: 100%; height: 100%; object-fit: cover; }

        #label-container { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
        .label-row { text-align: left; }
        .label-row .label-top {
            display: flex;
            justify-content: space-between;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 4px;
        }
        .bar-track {
            width: 100%;
            height: 10px;
            background: #eee;
            border-radius: 6px;
            overflow: hidden;
        }
        .bar-fill {
            height: 100%;
            background: var(--primary);
            border-radius: 6px;
            transition: width 0.2s ease;
            width: 0%;
        }
        #status { font-size: 13px; color: #888; min-height: 18px; margin-top: 8px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Fruit &amp; Vegetable Ripeness Detector</h1>
    <p>Use your live webcam or upload a photo to scan produce.</p>

    <div class="mode-tabs">
        <button class="mode-tab active" id="tab-webcam" onclick="switchMode('webcam')">Webcam</button>
        <button class="mode-tab" id="tab-upload" onclick="switchMode('upload')">Upload Image</button>
    </div>

    <div id="webcam-section">
        <div class="btn-row">
            <button class="action" id="start-btn" onclick="startWebcam()">Start Detector</button>
            <button class="action stop" id="stop-btn" onclick="stopWebcam()" disabled>Stop</button>
        </div>
        <div id="webcam-container"><span>Webcam Off</span></div>
    </div>

    <div id="upload-section">
        <label class="upload-drop" id="upload-drop">
            <span id="upload-placeholder">Tap to choose an image</span>
            <img id="preview-img" style="display:none;">
        </label>
        <input type="file" id="file-input" accept="image/*">
    </div>

    <div id="status"></div>
    <div id="label-container"></div>
</div>

<script type="text/javascript">
    // PUT YOUR MODEL LINK HERE — must end with a trailing slash /
    const URL = "https://teachablemachine.withgoogle.com/models/_ZyGXwbcZ/";

    let model, webcam, labelContainer, maxPredictions;
    let webcamRunning = false;
    let currentMode = 'webcam';

    const statusEl = document.getElementById("status");
    const webcamEl = document.getElementById("webcam-container");
    const startBtn = document.getElementById("start-btn");
    const stopBtn = document.getElementById("stop-btn");

    async function ensureModelLoaded() {
        if (model) return true;
        if (typeof tmImage === 'undefined') {
            statusEl.innerText = "Library failed to load — check your internet connection or try refreshing.";
            return false;
        }
        statusEl.innerText = "Loading model...";
        const modelURL = URL + "model.json";
        const metadataURL = URL + "metadata.json";
        model = await tmImage.load(modelURL, metadataURL);
        maxPredictions = model.getTotalClasses();
        buildLabelRows();
        statusEl.innerText = "";
        return true;
    }

    function buildLabelRows() {
        labelContainer = document.getElementById("label-container");
        labelContainer.innerHTML = "";
        for (let i = 0; i < maxPredictions; i++) {
            const row = document.createElement("div");
            row.className = "label-row";
            row.innerHTML =
                '<div class="label-top"><span class="label-name">Class ' + i + '</span><span class="label-pct">0%</span></div>' +
                '<div class="bar-track"><div class="bar-fill"></div></div>';
            labelContainer.appendChild(row);
        }
    }

    function renderPredictions(prediction) {
        for (let i = 0; i < maxPredictions; i++) {
            const row = labelContainer.children[i];
            const pct = (prediction[i].probability * 100).toFixed(0);
            row.querySelector(".label-name").innerText = prediction[i].className;
            row.querySelector(".label-pct").innerText = pct + "%";
            row.querySelector(".bar-fill").style.width = pct + "%";
        }
    }

    // ---------- Webcam mode ----------
    async function startWebcam() {
        try {
            const ok = await ensureModelLoaded();
            if (!ok) return;

            statusEl.innerText = "Requesting webcam access...";
            const flip = true;
            webcam = new tmImage.Webcam(200, 200, flip);
            await webcam.setup();
            await webcam.play();

            webcamEl.innerHTML = "";
            webcamEl.appendChild(webcam.canvas);

            webcamRunning = true;
            startBtn.disabled = true;
            stopBtn.disabled = false;
            statusEl.innerText = "";
            window.requestAnimationFrame(webcamLoop);
        } catch (error) {
            statusEl.innerText = "Error: " + error.message;
            console.error(error);
        }
    }

    function stopWebcam() {
        webcamRunning = false;
        if (webcam) {
            webcam.stop();
        }
        webcamEl.innerHTML = "<span>Webcam Off</span>";
        startBtn.disabled = false;
        stopBtn.disabled = true;
        statusEl.innerText = "Stopped.";
    }

    async function webcamLoop() {
        if (!webcamRunning) return;
        webcam.update();
        const prediction = await model.predict(webcam.canvas);
        renderPredictions(prediction);
        window.requestAnimationFrame(webcamLoop);
    }

    // ---------- Upload mode ----------
    const fileInput = document.getElementById("file-input");
    const uploadDrop = document.getElementById("upload-drop");
    const previewImg = document.getElementById("preview-img");
    const uploadPlaceholder = document.getElementById("upload-placeholder");

    uploadDrop.addEventListener("click", () => fileInput.click());

    fileInput.addEventListener("change", async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = async (evt) => {
            previewImg.src = evt.target.result;
            previewImg.style.display = "block";
            uploadPlaceholder.style.display = "none";

            previewImg.onload = async () => {
                try {
                    const ok = await ensureModelLoaded();
                    if (!ok) return;
                    statusEl.innerText = "Analyzing image...";
                    const prediction = await model.predict(previewImg);
                    renderPredictions(prediction);
                    statusEl.innerText = "";
                } catch (error) {
                    statusEl.innerText = "Error: " + error.message;
                    console.error(error);
                }
            };
        };
        reader.readAsDataURL(file);
    });

    // ---------- Mode switching ----------
    function switchMode(mode) {
        currentMode = mode;
        document.getElementById("tab-webcam").classList.toggle("active", mode === 'webcam');
        document.getElementById("tab-upload").classList.toggle("active", mode === 'upload');
        document.getElementById("webcam-section").style.display = mode === 'webcam' ? 'block' : 'none';
        document.getElementById("upload-section").classList.toggle("visible", mode === 'upload');

        if (mode === 'upload' && webcamRunning) {
            stopWebcam();
        }
        statusEl.innerText = "";
    }

    // Start in webcam mode view
    document.getElementById("upload-section").style.display = 'none';
</script>

</body>
</html>
