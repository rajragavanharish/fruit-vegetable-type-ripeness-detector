<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fruit & Vegetable Ripeness Detector</title>
    
    <!-- Using alternative p5 and ml5 libraries which handle Teachable Machine models natively -->
    <script src="https://cloudflare.com"></script>
    <script src="https://unpkg.com"></script>

    <style>
        :root {
            --primary: #4CAF50;
            --primary-hover: #45a049;
            --bg: #f4f7f6;
            --card-bg: #ffffff;
            --text: #333333;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        h1 {
            margin-top: 0;
            color: var(--primary);
            font-size: 24px;
        }
        p {
            color: #666;
            font-size: 14px;
            margin-bottom: 25px;
        }
        /* Canvas positioning inside our UI grid */
        #canvas-wrapper {
            margin: 20px auto;
            border-radius: 12px;
            overflow: hidden;
            width: 200px;
            height: 200px;
            background: #e0e0e0;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
        }
        #label-container {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .label-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f9f9f9;
            padding: 10px 15px;
            border-radius: 8px;
            border-left: 4px solid var(--primary);
            font-weight: 600;
            font-size: 15px;
        }
        #status-msg {
            font-weight: bold;
            color: var(--primary);
            margin: 10px 0;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Fruit & Vegetable Ripeness Detector</h1>
    <p>Allow webcam access to scan your produce items live.</p>
    <div id="status-msg">Initializing Application...</div>
    <div id="canvas-wrapper"></div>
    <div id="label-container"></div>
</div>

<script type="text/javascript">
    // Your exact model endpoint
    const modelURL = "https://withgoogle.com";
    
    let classifier;
    let video;
    let labelContainer;

    function setup() {
        // Create canvas inside our wrapper layout grid element
        let canvas = createCanvas(200, 200);
        canvas.parent('canvas-wrapper');
        
        // Boot streaming video immediately
        video = createCapture(VIDEO);
        video.size(200, 200);
        video.hide();

        labelContainer = document.getElementById("label-container");
        document.getElementById("status-msg").innerText = "Loading AI Intelligence Model...";
        
        // Load the model using ml5 library instead of original tmImage
        classifier = ml5.imageClassifier(modelURL + 'model.json', video, modelReady);
    }

    function modelReady() {
        document.getElementById("status-msg").innerText = "System Active";
        classifyVideo();
    }

    function classifyVideo() {
        classifier.classify(gotResult);
    }

    function draw() {
        // Draw video capture directly to screen canvas
        image(video, 0, 0, 200, 200);
    }

    function gotResult(error, results) {
        if (error) {
            document.getElementById("status-msg").innerText = "Error: " + error.message;
            return;
        }
        
        // Render outputs 
        labelContainer.innerHTML = "";
        for (let i = 0; i < results.length; i++) {
            const div = document.createElement("div");
            div.className = "label-bar";
            div.innerHTML = "<span>" + results[i].label + "</span><span>" + (results[i].confidence * 100).toFixed(0) + "%</span>";
            labelContainer.appendChild(div);
        }
        
        // Loop classifications smoothly
        classifyVideo();
    }
</script>

</body>
</html>
