<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fruit &amp; Vegetable Ripeness Detector</title>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8.3/dist/teachablemachine-image.min.js"></script>

    <style>
        :root {
            --bg-top: #fff8e7;
            --bg-bottom: #eef6ea;
            --card-bg: #ffffff;
            --text: #2f3a2a;
            --text-muted: #6b7a64;
            --primary: #5a8f3c;
            --primary-dark: #466e2e;
            --accent: #e8772e;
            --tab-bg: #f0ead8;
            --low: #e5533d;
            --mid: #e8a93a;
            --high: #5a8f3c;
            --border: #e3ddc8;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(160deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
            color: var(--text);
            margin: 0;
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            background: var(--card-bg);
            padding: 32px;
            border-radius: 20px;
            box-shadow: 0 14px 38px rgba(70, 90, 50, 0.12);
            text-align: center;
            max-width: 480px;
            width: 100%;
            border: 1px solid var(--border);
        }

        .emoji-row {
            font-size: 26px;
            margin-bottom: 4px;
            letter-spacing: 4px;
        }

        h1 {
            margin: 4px 0 6px;
            color: var(--primary-dark);
            font-size: 23px;
            font-weight: 800;
            letter-spacing: -0.3px;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 13.5px;
            margin: 0 0 22px;
        }

        .mode-tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 22px;
            background: var(--tab-bg);
            border-radius: 12px;
            padding: 5px;
        }
        .mode-tab {
            flex: 1;
            padding: 9px 0;
            border: none;
            background: transparent;
            border-radius: 9px;
            font-weight: 700;
            font-size: 13.5px;
            cursor: pointer;
            color: var(--text-muted);
            transition: all 0.2s ease;
        }
        .mode-tab.active {
            background: var(--card-bg);
            color: var(--primary-dark);
            box-shadow: 0 3px 8px rgba(0,0,0,0.08);
        }

        .btn-row {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 4px;
        }
        button.action {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 26px;
            font-size: 14.5px;
            font-weight: 700;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.1s ease;
            box-shadow: 0 6px 14px rgba(90, 143, 60, 0.25);
        }
        button.action:hover { background: var(--primary-dark); }
        button.action:active { transform: scale(0.97); }
        button.action.stop {
            background: var(--accent);
            box-shadow: 0 6px 14px rgba(232, 119, 46, 0.25);
        }
        button.action.stop:hover { background: #c75f1f; }
        button.action:disabled {
            background: #d8d3c2;
            cursor: not-allowed;
            box-shadow: none;
        }

        #webcam-container {
            margin: 18px auto 8px;
            border-radius: 14px;
            overflow: hidden;
            width: 220px;
            height: 220px;
            background: #ece6d4;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border);
        }
        #webcam-container span { font-size: 13px; color: var(--text-muted); }

        #upload-section { display: none; }
        #upload-section.visible { display: block; }
        #file-input { display: none; }
        .upload-drop {
            margin: 4px auto 8px;
            width: 220px;
            height: 220px;
            border: 2px dashed #c9bf9e;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            overflow: hidden;
            background: #fbf8ef;
            color: var(--text-muted);
            font-size: 13px;
            text-align: center;
            padding: 10px;
            transition: border-color 0.2s ease, background 0.2s ease;
        }
        .upload-drop:hover {
            border-color: var(--primary);
            background: #f5f0de;
        }
        .upload-drop img { width: 100%; height: 100%; object-fit: cover; }
        .upload-hint {
            font-size: 11.5px;
            color: var(--text-muted);
            margin: 0 0 6px;
        }
        .change-photo-btn {
            background: none;
            border: 1px solid var(--border);
            color: var(--text-muted);
            font-size: 12.5px;
            padding: 6px 14px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 4px;
        }
        .change-photo-btn:hover { border-color: var(--primary); color: var(--primary-dark); }

        #label-container { margin-top: 18px; display: flex; flex-direction: column; gap: 11px; }
        .label-row { text-align: left; }
        .label-row .label-top {
            display: flex;
            justify-content: space-between;
            font-weight: 700;
            font-size: 13.5px;
            margin-bottom: 4px;
            color: var(--text);
        }
        .label-row .label-pct { font-weight: 800; }
        .bar-track {
            width: 100%;
            height: 11px;
            background: #ece6d4;
            border-radius: 7px;
            overflow: hidden;
        }
        .bar-fill {
            height: 100%;
            border-radius: 7px;
            transition: width 0.25s ease, background-color 0.25s ease;
            width: 0%;
            background: var(--low);
        }
        #status {
            font-size: 12.5px;
            color: var(--text-muted);
            min-height: 18px;
            margin-top: 6px;
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="emoji-row">🍌 🥭 🍓 🍉</div>
    <h1>Fruit &amp; Vegetable Ripeness Detector</h1>
    <p class="subtitle">Use your live webcam or upload a photo to scan produce.</p>

    <div class="mode-tabs">
        <button class="mode-tab active" id="tab-webcam" onclick="switchMode('webcam')">📷 Webcam</button>
        <button class="mode-tab" id="tab-upload" onclick="switchMode('upload')">🖼️ Upload Image</button>
    </div>

    <div id="webcam-section">
        <div class="btn-row">
            <button class="action" id="start-btn" onclick="startWebcam()">Start Detector</button>
            <button class="action stop" id="stop-btn" onclick="stopWebcam()" disabled>Stop</button>
        </div>
        <div id="webcam-container"><span>Webcam Off</span></div>
    </div>

    <div id="upload-section">
        <p class="upload-hint">Tap below to choose a photo from your device</p>
        <label class="upload-drop" id="upload-drop">
            <span id="upload-placeholder">📤 Tap to choose an image</span>
            <img id="preview-img" style="display:none;">
        </label>
        <input type="file" id="file-input" accept="image/*">
        <br>
        <button class="change-photo-btn" id="change-photo-btn" style="display:none;" onclick="document.getElementById('file-input').click()">Choose a different photo</button>
    </div>

    <div id="status"></div>
    <div id="label-container"></div>
</div>

<script type="text/javascript">
    // PUT YOUR MODEL LINK HERE — must end with a trailing slash /
    const URL = "https://teachablemachine.withgoogle.com/models/_ZyGXwbcZ/";

    let model, webcam, labelContainer, maxPredictions;
    let webcamRunning = false;

    const statusEl = document.getElementById("status");
    const webcamEl = document.getElementById("webcam-container");
    const startBtn = document.getElementById("start-btn");
    const stopBtn = document.getElementById("stop-btn");

    function colorForConfidence(p) {
        if (p < 0.5) {
            const t = p / 0.5;
            return mixColor([229,83,61], [232,169,58], t);
        } else {
            const t = (p - 0.5) / 0.5;
            return mixColor([232,169,58], [90,143,60], t);
        }
    }
    function mixColor(a, b, t) {
        const r = Math.round(a[0] + (b[0]-a[0])*t);
        const g = Math.round(a[1] + (b[1]-a[1])*t);
        const bl = Math.round(a[2] + (b[2]-a[2])*t);
        return `rgb(${r},${g},${bl})`;
    }

    async function ensureModelLoaded() {
        if (model) return true;
        if (typeof tmImage === 'undefined') {
            statusEl.innerText = "Library failed to load — check your internet connection or try refreshing.";
            return false;
        }
        statusEl.innerText = "Loading model...";
        const modelURL = URL + "model.json";
        const metadataURL = URL + "metadata.json";
        model = await tmImage.load(modelURL, metadataURL);
        maxPredictions = model.getTotalClasses();
        buildLabelRows();
        statusEl.innerText = "";
        return true;
    }

    function buildLabelRows() {
        labelContainer = document.getElementById("label-container");
        labelContainer.innerHTML = "";
        for (let i = 0; i < maxPredictions; i++) {
            const row = document.createElement("div");
            row.className = "label-row";
            row.innerHTML =
                '<div class="label-top"><span class="label-name">Class ' + i + '</span><span class="label-pct">0%</span></div>' +
                '<div class="bar-track"><div class="bar-fill"></div></div>';
            labelContainer.appendChild(row);
        }
    }

    function renderPredictions(prediction) {
        for (let i = 0; i < maxPredictions; i++) {
            const row = labelContainer.children[i];
            const probability = prediction[i].probability;
            const pct = (probability * 100).toFixed(0);
            row.querySelector(".label-name").innerText = prediction[i].className;
            row.querySelector(".label-pct").innerText = pct + "%";
            const fill = row.querySelector(".bar-fill");
            fill.style.width = pct + "%";
            fill.style.background = colorForConfidence(probability);
        }
    }

    async function startWebcam() {
        try {
            const ok = await ensureModelLoaded();
            if (!ok) return;

            statusEl.innerText = "Requesting webcam access...";
            const flip = true;
            webcam = new tmImage.Webcam(220, 220, flip);
            await webcam.setup();
            await webcam.play();

            webcamEl.innerHTML = "";
            webcamEl.appendChild(webcam.canvas);

            webcamRunning = true;
            startBtn.disabled = true;
            stopBtn.disabled = false;
            statusEl.innerText = "";
            window.requestAnimationFrame(webcamLoop);
        } catch (error) {
            statusEl.innerText = "Error: " + error.message;
            console.error(error);
        }
    }

    function stopWebcam() {
        webcamRunning = false;
        if (webcam) {
            webcam.stop();
        }
        webcamEl.innerHTML = "<span>Webcam Off</span>";
        startBtn.disabled = false;
        stopBtn.disabled = true;
        statusEl.innerText = "Stopped.";
    }

    async function webcamLoop() {
        if (!webcamRunning) return;
        webcam.update();
        const prediction = await model.predict(webcam.canvas);
        renderPredictions(prediction);
        window.requestAnimationFrame(webcamLoop);
    }

    const fileInput = document.getElementById("file-input");
    const uploadDrop = document.getElementById("upload-drop");
    const previewImg = document.getElementById("preview-img");
    const uploadPlaceholder = document.getElementById("upload-placeholder");
    const changePhotoBtn = document.getElementById("change-photo-btn");

    uploadDrop.addEventListener("click", () => fileInput.click());

    fileInput.addEventListener("change", async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (evt) => {
            previewImg.src = evt.target.result;
            previewImg.onload = async () => {
                previewImg.style.display = "block";
                uploadPlaceholder.style.display = "none";
                changePhotoBtn.style.display = "inline-block";
                try {
                    const ok = await ensureModelLoaded();
                    if (!ok) return;
                    statusEl.innerText = "Analyzing image...";
                    const prediction = await model.predict(previewImg);
                    renderPredictions(prediction);
                    statusEl.innerText = "";
                } catch (error) {
                    statusEl.innerText = "Error: " + error.message;
                    console.error(error);
                }
            };
        };
        reader.readAsDataURL(file);
    });

    function switchMode(mode) {
        document.getElementById("tab-webcam").classList.toggle("active", mode === 'webcam');
        document.getElementById("tab-upload").classList.toggle("active", mode === 'upload');

        const webcamSection = document.getElementById("webcam-section");
        const uploadSection = document.getElementById("upload-section");

        if (mode === 'webcam') {
            webcamSection.style.display = 'block';
            uploadSection.style.display = 'none';
            uploadSection.classList.remove('visible');
        } else {
            webcamSection.style.display = 'none';
            uploadSection.style.display = 'block';
            uploadSection.classList.add('visible');
            if (webcamRunning) stopWebcam();
        }
        statusEl.innerText = "";
    }

    document.getElementById("upload-section").style.display = 'none';
</script>

</body>
</html>
