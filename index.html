<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fruit &amp; Vegetable Ripeness Detector</title>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8.3/dist/teachablemachine-image.min.js"></script>

    <style>
        :root {
            --primary: #4CAF50;
            --primary-hover: #45a049;
            --bg: #f4f7f6;
            --card-bg: #ffffff;
            --text: #333333;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        h1 { margin-top: 0; color: var(--primary); font-size: 24px; }
        p { color: #666; font-size: 14px; margin-bottom: 25px; }
        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
        }
        button:hover { background-color: var(--primary-hover); }
        #webcam-container {
            margin: 20px auto;
            border-radius: 12px;
            overflow: hidden;
            width: 200px;
            height: 200px;
            background: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #label-container { margin-top: 20px; display: flex; flex-direction: column; gap: 8px; }
        .label-bar {
            display: flex;
            justify-content: space-between;
            background: #f9f9f9;
            padding: 10px 15px;
            border-radius: 8px;
            border-left: 4px solid var(--primary);
            font-weight: 600;
            font-size: 15px;
        }
        #status { font-size: 13px; color: #888; min-height: 18px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Fruit &amp; Vegetable Ripeness Detector</h1>
    <p>Click start and allow webcam access to scan your produce items live.</p>
    <button type="button" onclick="init()">Start Detector</button>
    <div id="status"></div>
    <div id="webcam-container"><span>Webcam Off</span></div>
    <div id="label-container"></div>
</div>

<script type="text/javascript">
    const URL = "https://teachablemachine.withgoogle.com/models/_ZyGXwbcZ/";

    let model, webcam, labelContainer, maxPredictions;

    async function init() {
        const statusEl = document.getElementById("status");
        const webcamEl = document.getElementById("webcam-container");

        try {
            if (typeof tmImage === 'undefined') {
                statusEl.innerText = "Library failed to load — check your internet connection or try refreshing.";
                return;
            }

            statusEl.innerText = "Loading model...";
            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";

            model = await tmImage.load(modelURL, metadataURL);
            maxPredictions = model.getTotalClasses();

            statusEl.innerText = "Requesting webcam access...";
            const flip = true;
            webcam = new tmImage.Webcam(200, 200, flip);
            await webcam.setup();
            await webcam.play();
            window.requestAnimationFrame(loop);

            webcamEl.innerHTML = "";
            webcamEl.appendChild(webcam.canvas);

            labelContainer = document.getElementById("label-container");
            labelContainer.innerHTML = "";
            for (let i = 0; i < maxPredictions; i++) {
                const div = document.createElement("div");
                div.className = "label-bar";
                labelContainer.appendChild(div);
            }
            statusEl.innerText = "";
        } catch (error) {
            statusEl.innerText = "Error: " + error.message;
            console.error(error);
        }
    }

    async function loop() {
        webcam.update();
        await predict();
        window.requestAnimationFrame(loop);
    }

    async function predict() {
        const prediction = await model.predict(webcam.canvas);
        for (let i = 0; i < maxPredictions; i++) {
            const classPrediction = prediction[i].className + ": " + (prediction[i].probability * 100).toFixed(0) + "%";
            labelContainer.childNodes[i].innerHTML = classPrediction;
        }
    }
</script>

</body>
</html>
